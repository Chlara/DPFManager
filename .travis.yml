language: java

addons:
  apt:
    packages: oracle-java8-installer

sudo: required

matrix:
  include:
    # Custom builds
#    - os: linux
#      jdk: oraclejdk8
#      env: TOKEN=nogui
#      script: mvn test -B -Dtest=commandline/*Test.java,implementationchecker/*Test.java
#    - os: linux
#      jdk: oraclejdk8
#      env: TOKEN=gui
#      script: mvn test -B -Dtest=gui/*Test.java
    - os: osx
      env: OS=osx
      script: mvn test -B -q
  exclude:
    # Exclude default build
    - jdk: oraclejdk8

before_install:
  - if [ "${TOKEN}" == "gui" ]; then export DISPLAY=:99.0; fi
  - if [ "${TOKEN}" == "gui" ]; then sh -e /etc/init.d/xvfb start; fi
  - if [ "${OS}" == "osx" ];
    then
      sudo brew update;
      sudo brew tap caskroom/cask;
      sudo brew install brew-cask;
      sudo brew cask install java;
      export DISPLAY=:99.0;
      Xvfb &;
    fi
